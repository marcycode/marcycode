# Save this file as .github/workflows/snake.yml in your marcycode/marcycode repo.
# It generates a matrix-green snake that eats your contribution graph, updated daily.
# After the first run succeeds, uncomment the snake <img> block in your README.

name: Generate contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: marcycode
          outputs: |
            github-snake-dark.svg?palette=github-dark&color_snake=#00FF41&color_dots=#161b22,#01311f,#034d2b,#00a343,#00ff41

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: .
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
